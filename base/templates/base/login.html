{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>

        body{
            margin:0;
            height:100vh;
            background:url("{% static 'images/bg4.jpg' %}") no-repeat center center/cover;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'DM Sans', sans-serif;
            position:relative;
        }

        body::before{
            content:"";
            position:absolute;
            inset:0;
            background:rgba(0,0,0,0.45);
        }

        .login-box{
            position:relative;
            z-index:2;
            width:390px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.12);
            backdrop-filter:blur(12px);
            border-radius:22px;
            padding:40px;
            color:white;
        }

        .login-title{
            font-family:'Playfair Display', serif;
            font-size:42px;
            text-align:center;
            margin-bottom:10px;
        }

        .login-sub{
            text-align:center;
            color:#ddd;
            font-size:14px;
            margin-bottom:35px;
        }

        .form-control{
            background:rgba(255,255,255,0.12);
            border:none;
            border-radius:12px;
            padding:14px;
            color:white;
            margin-bottom:16px;
        }

        .form-control::placeholder{
            color:#d8d8d8;
        }

        .form-control:focus{
            background:rgba(255,255,255,0.18);
            color:white;
            box-shadow:none;
        }

        .btn-login{
            width:100%;
            padding:13px;
            border:none;
            border-radius:12px;
            background:#B8965A;
            color:white;
            transition:0.3s;
            margin-bottom:14px;
        }

        .btn-login:hover{
            background:#9A7A44;
        }

        .btn-cancel{
            width:100%;
            padding:13px;
            border-radius:12px;
            text-decoration:none;
            display:block;
            text-align:center;
            border:1px solid rgba(255,255,255,0.2);
            color:white;
            transition:0.3s;
        }

        .btn-cancel:hover{
            background:rgba(255,255,255,0.08);
            color:white;
        }

        .error-msg{
            color:#ffb0b0;
            text-align:center;
            margin-top:18px;
            font-size:14px;
        }

    </style>

</head>

<body>

<div class="login-box">

    <div class="login-title">
        Connexion
    </div>

    <div class="login-sub">
        Accédez à votre espace GST HOTEL
    </div>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               class="form-control"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               class="form-control"
               placeholder="Password"
               required>

        <button type="submit"
                class="btn-login">

            Login

        </button>

        <a href="{% url 'acceuil' %}"
           class="btn-cancel">

            Annuler

        </a>

        {% if error %}

            <div class="error-msg">
                {{ error }}
            </div>

        {% endif %}

    </form>

</div>

</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>GST HOTEL</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:'DM Sans', sans-serif;
            background:#FAF8F5;
            color:#1C1A17;
        }

        /* NAVBAR */

        .hotel-nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px 40px;
            background:white;
            border-bottom:1px solid rgba(0,0,0,0.08);
        }

        .hotel-brand{
            font-family:'Playfair Display', serif;
            font-size:28px;
            font-weight:bold;
            text-decoration:none;
            color:#1C1A17;
        }

        .hotel-brand span{
            color:#B8965A;
        }

        .nav-right{
            display:flex;
            align-items:center;
            gap:15px;
        }

        .nav-btn{
            text-decoration:none;
            color:#6B6357;
            font-size:14px;
            transition:0.3s;
        }

        .nav-btn:hover{
            color:#B8965A;
        }

        .logout{
            color:#B03A2E;
        }

        /* TITLE */

        .hero{
            text-align:center;
            padding:60px 20px;
        }

        .hero h1{
            font-family:'Playfair Display', serif;
            font-size:55px;
            margin-bottom:10px;
        }

        .hero p{
            color:#6B6357;
        }

        /* ROOMS */

        .rooms-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:22px;
            padding:0 40px 60px;
        }

        .room-card{
            background:white;
            border-radius:16px;
            padding:25px;
            border:1px solid rgba(0,0,0,0.08);
            transition:0.3s;
        }

        .room-card:hover{
            transform:translateY(-5px);
            box-shadow:0 12px 30px rgba(0,0,0,0.07);
        }

        .room-type{
            font-family:'Playfair Display', serif;
            font-size:24px;
            margin-bottom:10px;
        }

        .room-price{
            color:#B8965A;
            font-size:22px;
            margin-bottom:18px;
        }

        .badge-room{
            display:inline-block;
            padding:6px 14px;
            border-radius:20px;
            font-size:13px;
            margin-bottom:18px;
        }

        .available{
            background:#E8F5EE;
            color:#1a6e3e;
        }

        .not-available{
            background:#FAEAEA;
            color:#992222;
        }

        .btn-reserve{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#B8965A;
            color:white;
            text-decoration:none;
            display:block;
            text-align:center;
            transition:0.3s;
        }

        .btn-reserve:hover{
            background:#9A7A44;
            color:white;
        }

        .btn-disabled{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#ececec;
            color:#777;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="hotel-nav">

    <a href="{% url 'acceuil' %}" class="hotel-brand">
        GST<span>.</span>HOTEL
    </a>

    <div class="nav-right">

        <span>
            {{ user.username }}
        </span>

        <a href="{% url 'panier' %}" class="nav-btn">
            Mon Panier
        </a>

        <a href="{% url 'logout' %}" class="nav-btn logout">
            Logout
        </a>

    </div>

</nav>

<!-- HERO -->
<div class="hero">

    <h1>Liste des chambres</h1>

    <p>
        Découvrez nos chambres disponibles
    </p>

</div>

<!-- ROOMS -->
<div class="rooms-grid">

    {% for item in data %}

    <div class="room-card">

        <div class="room-type">
            {{ item.salle.type }}
        </div>

        <div class="room-price">
            {{ item.salle.prix }} DH
        </div>

        {% if item.disponible %}

            <span class="badge-room available">
                Disponible
            </span>

            <a href="{% url 'reserver_salle' item.salle.id %}"
               class="btn-reserve">

                Réserver

            </a>

        {% else %}

            <span class="badge-room not-available">
                Non disponible
            </span>

            <button class="btn-disabled">
                Chambre occupée
            </button>

        {% endif %}

    </div>

    {% endfor %}

</div>

</body>
</html>

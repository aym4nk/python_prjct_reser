<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Réservation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet">

    <style>

        body{
            margin:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#FAF8F5;
            font-family:'DM Sans', sans-serif;
            color:#1C1A17;
            padding:40px 20px;
        }

        .reservation-card{
            width:100%;
            max-width:520px;
            background:white;
            border-radius:22px;
            padding:45px;
            border:1px solid rgba(0,0,0,0.08);
            box-shadow:0 10px 35px rgba(0,0,0,0.05);
        }

        .reservation-title{
            font-family:'Playfair Display', serif;
            font-size:42px;
            margin-bottom:10px;
        }

        .reservation-room{
            color:#B8965A;
            font-size:18px;
            margin-bottom:35px;
        }

        .form-label{
            font-size:14px;
            margin-bottom:10px;
            color:#6B6357;
        }

        .form-control{
            border:none;
            background:#F5F2EC;
            padding:14px;
            border-radius:12px;
            margin-bottom:20px;
            box-shadow:none !important;
        }

        .form-control:focus{
            background:#EFE9DE;
        }

        .btn-confirm{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#B8965A;
            color:white;
            transition:0.3s;
            margin-bottom:14px;
        }

        .btn-confirm:hover{
            background:#9A7A44;
        }

        .btn-retour{
            width:100%;
            display:block;
            text-align:center;
            padding:14px;
            border-radius:12px;
            text-decoration:none;
            border:1px solid rgba(0,0,0,0.1);
            color:#1C1A17;
            transition:0.3s;
        }

        .btn-retour:hover{
            background:#F5F2EC;
            color:#1C1A17;
        }

        .alert{
            border-radius:12px;
            margin-bottom:25px;
        }

    </style>

</head>

<body>

<div class="reservation-card">

    <div class="reservation-title">

        Réservation

    </div>

    <div class="reservation-room">

        {{ salle.type }}

    </div>

    {% if error %}

        <div class="alert alert-danger">

            {{ error }}

        </div>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <label class="form-label">

            Date début

        </label>

        <input type="date"
               name="date_debut"
               class="form-control"
               required>

        <label class="form-label">

            Date fin

        </label>

        <input type="date"
               name="date_fin"
               class="form-control"
               required>

        <button type="submit"
                class="btn-confirm">

            Confirmer réservation

        </button>

        <a href="{% url 'main' %}"
           class="btn-retour">

            Retour

        </a>

    </form>

</div>

</body>
</html>
